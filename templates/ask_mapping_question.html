{% extends "base.html" %}
{% block title %}Ask a Mapping Question — SOP Hub{% endblock %}
{% block content %}

<style>
  .sc-tag-pill         { padding:.25rem .75rem; border-radius:9999px; border:1px solid #d1d5db;
                         font-size:.78rem; color:#6b7280; background:white; cursor:pointer;
                         white-space:nowrap; }
  .sc-tag-pill:hover   { background:#f3f4f6; }
  .sc-tag-active       { background:#1d4ed8; color:white; border-color:#1d4ed8; }
  .sc-tag-active:hover { background:#1e40af; }
  .sc-card-recent      { background:#f0fdf4 !important; border-color:#86efac !important; }
  .sc-recent-badge     { font-size:.7rem; background:#dcfce7; color:#15803d;
                         padding:.15rem .5rem; border-radius:9999px; font-weight:600;
                         white-space:nowrap; flex-shrink:0; }
  .sc-meta-date        { font-size:.7rem; color:#9ca3af; flex-shrink:0; }
</style>

<h1 class="text-2xl font-bold mb-1">Ask a Mapping Question</h1>
<p class="text-sm text-gray-500 mb-4">Search approved Mapping guidance. This does not generate new answers.</p>

<div class="mb-5 max-w-2xl sc-search-wrapper">

  <!-- SEARCH BAR + CLEAR ALL -->
  <div class="flex gap-2 items-center">
    <div class="relative flex-1">
      <input id="scSearch"
             type="text"
             placeholder="Type a Mapping question or keyword..."
             class="border p-2 rounded w-full text-sm"
             autocomplete="off">
      <div id="scSuggestions" class="sc-suggestions hidden"></div>
    </div>
    <button id="scClearAll"
            class="whitespace-nowrap text-sm border border-gray-300 rounded px-3 py-2
                   text-gray-500 hover:bg-gray-100 flex-shrink-0">
      Clear All
    </button>
  </div>

  <p class="text-xs text-gray-400 mt-1 mb-3">
    Examples: bad legal, do not create transfer, tract multiple owners
  </p>

  <!-- TOPIC TAG PILLS -->
  <div id="scTagPills" class="flex flex-wrap gap-1.5 min-h-[2rem]"></div>

</div>

<div id="scResults" class="space-y-4"></div>

<script src="{{ url_for('static', filename='js/scenario_cards.js') }}?v=3"></script>
{% endblock %}
