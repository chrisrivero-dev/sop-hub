{% extends "base.html" %}
{% block content %}

<style>
    #referencePreview {
        position: sticky;
        top: 16px;
        max-height: calc(100vh - 120px);
        overflow-y: auto;
    }
</style>

<div class="container mx-auto mt-4 px-4">

    <!-- TOOLBAR -->
    <div class="flex items-center gap-3 mb-4 flex-wrap">
        <h1 class="text-xl font-bold">Search Hub</h1>

        <button id="reindexBtn"
            class="bg-green-600 text-white px-3 py-1.5 rounded text-sm hover:bg-green-700 whitespace-nowrap">
            Rebuild Index
        </button>
        <span id="reindexStatus" class="text-sm font-semibold text-gray-600"></span>

        <div class="flex items-center gap-1.5 ml-auto">
            <input type="checkbox" id="autoOpenToggle" class="form-checkbox">
            <label for="autoOpenToggle" class="text-sm text-gray-500 whitespace-nowrap">Auto-open on pin</label>
        </div>
    </div>

    {% if first_time %}
    <div class="bg-yellow-100 text-yellow-800 p-3 rounded mb-4 border text-sm">
        <strong>Your file index is empty.</strong> Click <strong>Rebuild Index</strong> to enable fast search.
    </div>
    {% endif %}

    <!-- SEARCH BAR -->
    <div class="flex gap-2 mb-5">
        <input id="searchInput" type="text" placeholder="Search by document type, keyword, or scenario..."
            class="border p-2.5 flex-grow rounded text-sm w-full">
        <button id="searchBtn"
            class="bg-blue-600 text-white px-5 py-2 rounded text-sm whitespace-nowrap hover:bg-blue-700">
            Search
        </button>
    </div>

    <!-- RESULTS + PREVIEW -->
    <div class="flex flex-col lg:flex-row gap-5 items-start">

        <div id="resultsContainer" class="flex-1 min-w-0 space-y-3"></div>

        <div id="referencePreview"
            class="w-full lg:w-[360px] flex-shrink-0 p-4 border rounded bg-white shadow-sm min-h-[200px]">
            <div class="text-xs text-gray-400 uppercase tracking-wide mb-2">Document Preview</div>
            <div class="text-gray-400 text-sm">Select a file to preview.</div>
        </div>

    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const toggle = document.getElementById("autoOpenToggle");
        if (localStorage.getItem("autoOpen") === "1") toggle.checked = true;
        toggle.addEventListener("change", () => {
            localStorage.setItem("autoOpen", toggle.checked ? "1" : "0");
        });

        const input = document.getElementById("searchInput");
        if (input) input.value = "";

        const reindexBtn = document.getElementById("reindexBtn");
        if (reindexBtn) {
            reindexBtn.addEventListener("click", async () => {
                const status = document.getElementById("reindexStatus");
                status.textContent = "Rebuilding… please wait.";
                try {
                    const resp = await fetch("/reindex", { method: "POST" });
                    const data = await resp.json();
                    if (data.success) {
                        status.textContent = "Done! Refreshing…";
                        setTimeout(() => window.location.reload(), 1200);
                    } else {
                        status.textContent = "Error rebuilding index.";
                    }
                } catch (err) {
                    console.error(err);
                    status.textContent = "Unexpected error.";
                }
            });
        }

    });
</script>

<script src="/static/js/reference_preview.js?v=2"></script>
<script src="/static/js/search_assistant.js?v=7"></script>

{% endblock %}
