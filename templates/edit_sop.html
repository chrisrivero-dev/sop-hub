<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ 'Edit' if sop else 'New' }} SOP</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans min-h-screen">

  <header class="bg-white shadow p-4 flex items-center gap-4">
    <a href="{{ url_for('index') }}" class="text-blue-600 hover:underline">&larr; Back</a>
    <h1 class="text-2xl font-bold">{{ 'Edit' if sop else 'New' }} SOP</h1>
  </header>

  <main class="max-w-3xl mx-auto bg-white mt-6 p-6 rounded shadow">
    <form method="POST" action="">
      <div class="mb-4">
        <label for="title" class="block text-sm font-medium">Title</label>
        <input type="text" id="title" name="title" class="mt-1 w-full border px-3 py-2 rounded" value="{{ sop.title if sop else '' }}" required>
      </div>

      <div class="mb-4">
        <label for="content" class="block text-sm font-medium">Content</label>
        <textarea id="content" name="content" class="mt-1 w-full border px-3 py-2 rounded h-40" required>{{ sop.content if sop else '' }}</textarea>
      </div>

      <div class="mb-4">
        <label for="tags" class="block text-sm font-medium">Tags (comma-separated)</label>
        <input type="text" id="tags" name="tags" class="mt-1 w-full border px-3 py-2 rounded" value="{{ sop.tags if sop else '' }}">
      </div>

      <div class="mb-6">
        <label for="editor" class="block text-sm font-medium">Editor Name</label>
        <input type="text" id="editor" name="editor" class="mt-1 w-full border px-3 py-2 rounded" value="{{ sop.editor if sop else '' }}">
      </div>

      <div class="flex justify-end gap-4">
        <a href="{{ url_for('index') }}" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save SOP</button>
      </div>
    </form>
  </main>

</body>
</html>
