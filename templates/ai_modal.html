<!-- AI MODAL -->
<div id="aiModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded shadow-md w-full max-w-lg relative">
    <button onclick="toggleAIModal()" class="absolute top-2 right-2 text-gray-500 hover:text-black">&times;</button>

    <h3 class="text-lg font-semibold mb-2">AI Assistant</h3>

    <div class="flex gap-4 mb-2">
      <label><input type="radio" name="aiMode" value="search" checked> Search SOPs</label>
      <label><input type="radio" name="aiMode" value="draft"> Generate SOP Draft</label>
    </div>

    <textarea id="aiInput" placeholder="Type a topic..." class="w-full border rounded p-2 mb-2"></textarea>

    <button onclick="submitAI()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Submit</button>

    <pre id="aiOutput" class="mt-4 bg-gray-100 p-2 rounded text-sm whitespace-pre-wrap"></pre>
  </div>
</div>
